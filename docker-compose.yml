version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: notcast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: notcast
      POSTGRES_PASSWORD: notcast_password
      POSTGRES_DB: notcast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notcast -d notcast"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notcast-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: notcast-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO bucket oluşturma (ilk çalıştırmada)
  minio-init:
    image: minio/mc:latest
    container_name: notcast-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/notcast-uploads &&
      mc anonymous set download local/notcast-uploads/public
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: notcast-network
