name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ── Lint & Typecheck ────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (server)
        run: pnpm --filter @notcast/server lint

      - name: Lint (web)
        run: pnpm --filter @notcast/web lint

      - name: Typecheck (server)
        run: pnpm --filter @notcast/server typecheck

      - name: Typecheck (web)
        run: pnpm --filter @notcast/web typecheck

  # ── Backend Tests ───────────────────────────────────────────────────────
  test-server:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-minimum-32-chars-long!!
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars-long!
      DATABASE_URL: postgresql://notcast:notcast@localhost:5432/notcast_test
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: notcast-test
      S3_REGION: us-east-1
      ELEVENLABS_API_KEY: test-key
      ANTHROPIC_API_KEY: test-key
      GOOGLE_CLOUD_PROJECT_ID: test-project
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @notcast/server db:generate

      - name: Run backend tests
        run: pnpm --filter @notcast/server test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage
          path: apps/server/coverage/
          retention-days: 7

  # ── Docker Build Check ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    # Sadece main branch'e push'ta çalışır (PR'larda atla)
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: false
          tags: notcast/server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: notcast/web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001/api
            NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (main branch only) ───────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, test-server, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/notcast-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/notcast-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/notcast-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/notcast-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/notcast
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans
            docker image prune -f
